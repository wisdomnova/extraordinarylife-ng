<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Extraordinary Life | Co-working Booking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/floor-plan.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="loading-screen" id="loading-screen">
    <div class="loading-logo">Extraordinary<span>Life</span></div>
    <div class="loading-spinner"></div>
  </div>

  <div id="app"></div>
  <div id="boot-error" class="boot-error" hidden></div>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script>
    window.EL_API_URL =
      location.hostname === 'localhost' || location.hostname === '127.0.0.1'
        ? 'http://localhost:4000'
        : 'https://extraordinarylife-backend-production.up.railway.app';
  </script>
  <script>
    (function () {
      var shown = false;
      function showBootError(msg) {
        if (shown) return;
        shown = true;
        var loader = document.getElementById('loading-screen');
        var err = document.getElementById('boot-error');
        if (loader) loader.classList.add('loading-screen--hide');
        if (err) {
          err.hidden = false;
          err.innerHTML =
            '<div class="boot-error__card">' +
            '<h2>Could not start the app</h2>' +
            '<p>' + msg + '</p>' +
            '<p class="boot-error__hint">Run a local server from the project folder:</p>' +
            '<code>cd ~/extraordinarylife && npm start</code>' +
            '<p class="boot-error__hint">Then open <strong>http://localhost:3456</strong> (not the HTML file directly).</p>' +
            '</div>';
        }
      }
      window.addEventListener('error', function (e) {
        showBootError(e.message || 'A script failed to load.');
      });
      window.addEventListener('unhandledrejection', function (e) {
        showBootError((e.reason && e.reason.message) || String(e.reason) || 'Module load failed.');
      });
      setTimeout(function () {
        if (window.__EL_APP_READY__) return;
        var loader = document.getElementById('loading-screen');
        if (loader && !loader.classList.contains('loading-screen--hide')) {
          showBootError(
            'App scripts did not load. Use a local server. Do not open the HTML file directly.'
          );
        }
      }, 10000);
    })();
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
